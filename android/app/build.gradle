apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

react {
    entryFile = file(
        ["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"]
            .execute(null, rootDir)
            .text
            .trim()
    )

    reactNativeDir = new File(
        ["node", "--print", "require.resolve('react-native/package.json')"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile()

    hermesCommand = new File(
        reactNativeDir,
        "sdks/hermesc/%OS-BIN%/hermesc"
    ).absolutePath

    codegenDir = new File(
        ["node", "--print", "require.resolve('@react-native/codegen/package.json')"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile()

    cliFile = new File(
        ["node", "--print", "require.resolve('@expo/cli/package.json')"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile()

    bundleCommand = "export:embed"

    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds =
        (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.natureswad"

    defaultConfig {
        applicationId "com.natureswad"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled enableProguardInReleaseBuilds

            proguardFiles getDefaultProguardFile(
                    "proguard-android.txt"
            ), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging(
                (findProperty('expo.useLegacyPackaging') ?: false).toBoolean()
            )
        }
    }

    androidResources {
        ignoreAssetsPattern
            '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    implementation platform("com.google.firebase:firebase-bom:33.1.0")
    implementation "com.google.firebase:firebase-analytics-ktx"
    implementation "com.google.firebase:firebase-auth"
    implementation "com.google.firebase:firebase-firestore"

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true"
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true"

    def isWebpAnimatedEnabled =
            (findProperty('expo.webp.animated') ?: "") == "true"

    if (isGifEnabled) {
        implementation(
            "com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}"
        )
    }

    if (isWebpEnabled) {
        implementation(
            "com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}"
        )

        if (isWebpAnimatedEnabled) {
            implementation(
                "com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}"
            )
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}